// ─── STATE ──────────────────────────────────────────────────────────────────
let currentTab = 'topics';
let qi = 0, selected = null, score = 0, answered = 0;

// ─── TAB SWITCHING ──────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  currentTab = name;
  document.getElementById('quizStats').style.display = name === 'quiz' ? 'flex' : 'none';
}

// ─── RENDER TOPICS ──────────────────────────────────────────────────────────
function renderTopics() {
  const c = document.getElementById('topicsContainer');
  c.innerHTML = TOPICS.map(t => `
    <div class="card ${t.accent ? 'card-accent' : 'card-dim'}">
      <div class="topic-header">
        <span class="topic-title">${t.icon} ${t.title}</span>
        <span class="topic-weight" style="color:${t.accent ? 'var(--accent)' : '#666'}">${t.weight}</span>
      </div>
      <div class="topic-desc">${t.desc}</div>
    </div>
  `).join('');

  const cs = document.getElementById('cheatSheet');
  cs.innerHTML = CHEAT.map(([k,v]) => `
    <div class="cheat-row">
      <span class="cheat-key">${k}</span>
      <span class="cheat-val">${v}</span>
    </div>
  `).join('');
}

// ─── RENDER QUIZ ────────────────────────────────────────────────────────────
function renderQuiz() {
  const q = QUESTIONS[qi];
  document.getElementById('qCat').textContent = q.cat.toUpperCase() + ' · Q' + (qi+1) + ' OF ' + QUESTIONS.length;
  document.getElementById('qText').textContent = q.q;

  const labels = ['A','B','C','D'];
  document.getElementById('qOpts').innerHTML = q.opts.map((opt,i) => `
    <div class="opt ${selected!==null?'locked':''} ${selected!==null&&i===q.ans?'correct':''} ${selected!==null&&i===selected&&selected!==q.ans?'wrong':''}"
         onclick="handleAnswer(${i})">
      <span class="opt-label">${labels[i]})</span>${opt}
    </div>
  `).join('');

  document.getElementById('qExpArea').innerHTML = selected !== null ? `
    <button class="toggle-btn" onclick="toggleExp()">Show Explanation</button>
    <div id="expBox" class="exp-box" style="display:none">
      <div class="exp-ans">✅ ${q.ca}</div>
      <div class="exp-text">${q.exp}</div>
    </div>
  ` : '';

  document.getElementById('btnPrev').disabled = qi === 0;
  document.getElementById('btnNext').disabled = qi === QUESTIONS.length - 1;

  // nav dots
  document.getElementById('qNav').innerHTML = QUESTIONS.map((_,i) => `
    <button class="q-nav-btn ${i===qi?'current':''}" onclick="goQ(${i})">${i+1}</button>
  `).join('');

  // stats
  document.getElementById('statQ').textContent = 'Q '+(qi+1)+'/'+QUESTIONS.length;
  document.getElementById('statC').textContent = '✓ '+score;
  document.getElementById('statW').textContent = '✗ '+(answered-score);
  document.getElementById('statL').textContent = (QUESTIONS.length-answered)+' left';
}

function toggleExp() {
  const box = document.getElementById('expBox');
  const btn = box.previousElementSibling;
  if(box.style.display==='none'){box.style.display='block';btn.textContent='Hide Explanation';}
  else{box.style.display='none';btn.textContent='Show Explanation';}
}

function handleAnswer(i) {
  if(selected!==null) return;
  selected = i;
  answered++;
  if(i===QUESTIONS[qi].ans) score++;
  renderQuiz();
}
function nextQ(){ if(qi<QUESTIONS.length-1){qi++;selected=null;renderQuiz();} }
function prevQ(){ if(qi>0){qi--;selected=null;renderQuiz();} }
function goQ(i){ qi=i;selected=null;renderQuiz(); }

// ─── RENDER PRACTICALS ──────────────────────────────────────────────────────
function renderPracticals() {
  document.getElementById('practicalsContainer').innerHTML = PRACTICALS.map(p => `
    <div class="prac-card">
      <div class="prac-title">📝 ${p.title}</div>
      <div class="prac-problem">${p.problem}</div>
      ${p.steps.map(s => `
        <div class="step">
          <div class="step-label">${s.label}</div>
          <div class="step-val ${s.highlight?'highlight':''}">${s.val}</div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

// ─── RENDER BLANKS ──────────────────────────────────────────────────────────
function renderBlanks() {
  document.getElementById('blanksContainer').innerHTML = BLANKS.map((b,i) => `
    <div class="blank-card">
      <div class="blank-q">${i+1}. ${b.q}</div>
      <button class="toggle-btn" onclick="toggleBlank(${i})">Reveal Answer</button>
      <div class="blank-ans" id="blank-${i}">→ ${b.a}</div>
    </div>
  `).join('');
}

function toggleBlank(i) {
  const el = document.getElementById('blank-'+i);
  const btn = el.previousElementSibling;
  const showing = el.classList.contains('show');
  el.classList.toggle('show');
  btn.textContent = showing ? 'Reveal Answer' : 'Hide Answer';
}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderTopics();
renderQuiz();
renderPracticals();
renderBlanks();
</script>
